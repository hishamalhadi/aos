# Preserved Instance Artifacts
#
# Items listed here are deployed to instance space but don't have matching
# templates in the framework. The instance_hygiene reconcile check skips them.
#
# Add items when:
#   - They live in instance space (~/.aos/services/, ~/Library/LaunchAgents/)
#   - Framework code or the operator depends on them
#   - They don't ship via core/services/ or config/launchagents/

services: {}
  # people.db moved to ~/.aos/data/people.db (no longer a service venv)

launchagents:
  com.aos.eventd:
    reason: "Event daemon — runs the comms bus, watchers, and consumers on port 4097"
    referenced_by:
      - core/services/eventd/
      - core/comms/bus.py
  com.aos.whatsmeow:
    reason: "WhatsApp bridge — Go-based relay on port 7601, used by comms WhatsApp adapter"
    referenced_by:
      - core/comms/channels/whatsapp.py
      - core/services/eventd/watchers/whatsapp.py
