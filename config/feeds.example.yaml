# AOS Intelligence Feed — Source Watchlist
# Copy to ~/.aos/config/feeds.yaml and customize.
# Sources are synced to the database on migration.
#
# route: RSSHub path (prepended with http://localhost:1200)
# route_url: direct RSS URL (for sources with native RSS)
# keywords: items must match at least one keyword (empty = accept all)
# priority: high (Telegram notify), normal, low

sources:
  # ── Twitter/X (requires TWITTER_AUTH_TOKEN in Keychain) ──
  # - name: "Andrej Karpathy"
  #   platform: twitter
  #   route: "/twitter/user/karpathy"
  #   priority: high
  #   keywords: [ai, llm, neural, knowledge, training]

  # - name: "Simon Willison"
  #   platform: twitter
  #   route: "/twitter/user/simonw"
  #   priority: normal
  #   keywords: [llm, python, sqlite, ai, claude]

  # ── YouTube ──
  # - name: "3Blue1Brown"
  #   platform: youtube
  #   route: "/youtube/channel/UCYO_jab_esuFRV4b17AJtAw"
  #   priority: high
  #   keywords: []

  # ── GitHub (releases) ──
  # - name: "crawl4ai releases"
  #   platform: github
  #   route: "/github/release/unclecode/crawl4ai"
  #   priority: normal
  #   keywords: []

  # ── Hacker News ──
  - name: "HN Best"
    platform: hackernews
    route: "/hackernews/best"
    priority: low
    keywords: [llm, ai, claude, apple, python, rust, mac]

  # ── Blogs (direct RSS, no RSSHub needed) ──
  # - name: "Simon Willison's blog"
  #   platform: blog
  #   route_url: "https://simonwillison.net/atom/everything/"
  #   priority: normal
  #   keywords: []

  # ── arXiv ──
  # - name: "arXiv cs.CL"
  #   platform: arxiv
  #   route: "/arxiv/search_query=cat:cs.CL&sortBy=submittedDate&sortOrder=descending"
  #   priority: normal
  #   keywords: [transformer, llm, rag, agent, retrieval]

triage:
  mode: keywords          # "keywords" (now) or "llm" (future)
  default_action: save    # what to do when source has no keywords

schedule:
  interval_minutes: 30

# ───────────────────────────────────────────────────────────
# Automation hooks — what to do when high-relevance items arrive
# ───────────────────────────────────────────────────────────
#
# The action engine reads this section on each `intelligence.brief_created`
# event and runs any matching actions. Rules match on relevance_score
# thresholds. Multiple rules can fire on the same item.
#
# All actions are optional. Remove or comment out any you don't want.

actions:
  high_relevance:
    threshold: 0.8
    description: Notable items worth seeing right away
    notify:
      telegram: true    # Send a Telegram message via the bridge
      event: true       # Emit an EventBus event for the UI badge
    create_task: false

  very_high_relevance:
    threshold: 0.95
    description: Research-worthy items — auto-create a task
    notify:
      telegram: true
      event: true
    create_task: true
    task_prefix: "Research:"
    task_priority: 2    # 1=urgent, 2=important, 3=default

  # Fires whenever a compilation proposal lands in the review queue
  proposal_pending:
    notify:
      event: true       # Pipeline view surfaces the badge

  # Fires whenever a capture is auto-compiled to the vault
  brief_compiled:
    notify:
      event: true
