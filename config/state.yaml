# AOS v2 System State

machine_user: agentalhadi
tailscale_ip: 100.112.113.53

# Services monitored by the watchdog
# The watchdog reads this list — add/remove services here, not in the script.
services:
  bridge:
    launchagent: com.agent.bridge
    # no health URL — daemon only, check via launchctl

  dashboard:
    launchagent: com.agent.dashboard
    health: http://127.0.0.1:4096/api/health

  listen:
    launchagent: com.agent.listen
    health: http://127.0.0.1:7600/health

  phoenix:
    launchagent: com.agent.phoenix
    health: http://127.0.0.1:6006

  whatsapp:
    launchagent: com.agent.whatsmeow
    health: http://127.0.0.1:7601/health

  claude-remote:
    launchagent: com.agent.claude-remote
    # no health URL — daemon only

  scheduler:
    launchagent: com.aos.scheduler
    # no health URL — periodic, not daemon

last_updated: "2026-03-21"
