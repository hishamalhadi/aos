# AOS v2 — Scheduled Jobs
# Read by ~/aos/core/bin/internal/scheduler every 5 minutes
#
# Schedule types:
#   every: 5m / 30m / 1h / 2h      — interval-based
#   at: "HH:MM"                    — daily at this time
#   weekday: sunday                 — with `at:`, once per week
#   monthday: 1                    — with `at:`, once per month
#   active_hours: "08:00-20:00"    — only run during these hours (for `every:`)
#   enabled: false                 — skip this job entirely
#
# All scripts are idempotent — safe to run manually anytime.

jobs:
  # ── Tier 1: System health ───────────────────────────────────────────────────

  watchdog:
    command: bash ~/aos/core/bin/crons/watchdog
    every: 5m
    timeout: 60

  check-update:
    command: bash ~/aos/core/bin/crons/check-update
    every: 2h
    timeout: 120

  auto-update:
    command: bash ~/aos/core/bin/crons/check-update --apply
    at: "04:00"
    timeout: 300
    # Runs at 4am daily. Pulls latest, migrates, syncs.
    # Disable if you prefer manual updates:
    # enabled: false

  sync-sessions:
    command: python3 ~/aos/core/bin/crons/sync-sessions
    every: 30m
    timeout: 120

  auto-commit:
    command: bash ~/aos/core/bin/crons/auto-commit cron
    every: 30m
    timeout: 120

  qmd-reindex:
    command: bash ~/aos/core/bin/crons/qmd-reindex
    every: 30m
    timeout: 120

  session-export:
    command: python3 ~/aos/core/bin/crons/session-export
    every: 2h
    timeout: 300

  rotate-logs:
    command: bash ~/aos/core/bin/crons/rotate-logs
    at: "03:00"
    timeout: 60

  # ── Tier 2: Knowledge & awareness ───────────────────────────────────────────

  compile-daily:
    command: python3 ~/aos/core/bin/crons/compile-daily
    at: "23:30"
    timeout: 120

  compile-weekly:
    command: python3 ~/aos/core/bin/crons/compile-weekly
    at: "23:45"
    weekday: friday
    timeout: 120

  inbox-collect:
    command: python3 ~/aos/core/bin/crons/inbox-collect
    every: 30m
    timeout: 120

  session-analysis:
    command: python3 ~/aos/core/bin/crons/session-analysis
    at: "22:00"
    weekday: sunday
    timeout: 180

  stale-detector:
    command: python3 ~/aos/core/bin/crons/stale-detector
    at: "08:00"
    timeout: 60

  contact-sync:
    command: python3 ~/aos/core/engine/comms/sync_contacts.py
    at: "05:30"
    timeout: 120
    # Incremental sync from macOS Contacts → People DB. Runs before morning briefing.

  stale-initiatives:
    command: python3 ~/aos/core/bin/crons/stale-initiatives
    at: "09:00"
    timeout: 60
    # Scans initiative docs for staleness (>3 days untouched), sends Telegram nudge

  nightly-pipeline:
    command: bash ~/aos/core/bin/crons/nightly-pipeline
    at: "23:00"
    timeout: 600

  morning-context:
    command: python3 ~/aos/core/bin/crons/morning-context
    at: "06:30"
    timeout: 60

  # ── Tier 3: Disabled until dependencies are met ─────────────────────────────
  # Enable these as integrations come online.

  weekly-digest:
    command: python3 ~/aos/core/bin/crons/weekly-digest
    at: "20:00"
    weekday: sunday
    timeout: 300
    # Sends Telegram summary + writes vault review note

  compile-patterns:
    command: python3 ~/aos/core/bin/crons/compile-patterns
    at: "04:00"
    timeout: 120
    # Scans sessions for repeated behaviors, compiles to scripts/docs

  reconcile-sessions:
    command: python3 ~/aos/core/bin/crons/reconcile-sessions --quiet
    every: 2h
    timeout: 60
    # Catch-up reconciliation. Primary trigger is SessionEnd hook.
    # This catches sessions that didn't end cleanly.

  # ── Tier 4: Intelligence ────────────────────────────────────────────────────

  comms-extract:
    command: python3 ~/aos/core/engine/comms/extract/lifecycle.py
    at: "05:00"
    timeout: 300

  comms-patterns:
    command: python3 ~/aos/core/engine/comms/patterns/compute.py
    at: "05:30"
    timeout: 180

  comms-graduation:
    command: python3 ~/aos/core/engine/comms/graduation/runner.py
    at: "06:00"
    timeout: 120

  # ── Planned (scripts not yet built) ─────────────────────────────────────────
  # These entries are placeholders. Scripts will be created when their
  # integration dependencies are ready.
  #
  # email-digest:     needs email integration
  # meeting-prep:     needs calendar integration
  # monthly-review:   needs 4+ weekly digests
  # channel-update:   v1 script, needs v2 rewrite

  # friction-rules:   needs bridge approval workflow
