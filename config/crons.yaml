# AOS v2 — Scheduled Jobs
# Read by ~/aos/core/bin/scheduler every 5 minutes
#
# Schedule types:
#   every: 5m / 30m / 1h / 2h      — interval-based
#   at: "HH:MM"                    — daily at this time
#   weekday: sunday                 — with `at:`, once per week
#   monthday: 1                    — with `at:`, once per month
#   active_hours: "08:00-20:00"    — only run during these hours (for `every:`)
#   enabled: false                 — skip this job entirely
#
# All scripts are idempotent — safe to run manually anytime.

jobs:
  # ── Tier 1: System health ───────────────────────────────────────────────────

  watchdog:
    command: bash ~/aos/core/bin/watchdog
    every: 5m
    timeout: 60

  check-update:
    command: bash ~/aos/core/bin/check-update
    every: 2h
    timeout: 120

  auto-update:
    command: bash ~/aos/core/bin/check-update --apply
    at: "04:00"
    timeout: 300
    # Runs at 4am daily. Pulls latest, migrates, syncs.
    # Disable if you prefer manual updates:
    # enabled: false

  auto-commit:
    command: bash ~/aos/core/bin/auto-commit cron
    every: 30m
    timeout: 120

  qmd-reindex:
    command: bash ~/aos/core/bin/qmd-reindex
    every: 30m
    timeout: 120

  session-export:
    command: python3 ~/aos/core/bin/session-export
    every: 2h
    timeout: 300

  rotate-logs:
    command: bash ~/aos/core/bin/rotate-logs
    at: "03:00"
    timeout: 60

  # ── Tier 2: Knowledge & awareness ───────────────────────────────────────────

  compile-daily:
    command: python3 ~/aos/core/bin/compile-daily
    at: "23:30"
    timeout: 120

  inbox-collect:
    command: python3 ~/aos/core/bin/inbox-collect
    every: 30m
    timeout: 120

  session-analysis:
    command: python3 ~/aos/core/bin/session-analysis
    at: "22:00"
    weekday: sunday
    timeout: 180

  stale-detector:
    command: python3 ~/aos/core/bin/stale-detector
    at: "08:00"
    timeout: 60

  nightly-pipeline:
    command: bash ~/aos/core/bin/nightly-pipeline
    at: "23:00"
    timeout: 600

  morning-context:
    command: python3 ~/aos/core/bin/morning-context
    at: "06:30"
    timeout: 60

  # ── Tier 3: Disabled until dependencies are met ─────────────────────────────
  # Enable these as integrations come online.

  weekly-digest:
    command: python3 ~/aos/core/bin/weekly-digest
    at: "20:00"
    weekday: sunday
    timeout: 300
    enabled: false  # needs porting from v1

  compile-patterns:
    command: python3 ~/aos/core/bin/compile-patterns
    at: "04:00"
    timeout: 120
    enabled: false  # needs execution logging infrastructure

  # ── Planned (scripts not yet built) ─────────────────────────────────────────
  # These entries are placeholders. Scripts will be created when their
  # integration dependencies are ready.
  #
  # email-digest:     needs email integration
  # meeting-prep:     needs calendar integration
  # monthly-review:   needs 4+ weekly digests
  # channel-update:   v1 script, needs v2 rewrite
  # phoenix-weekly:   v1 script, needs v2 rewrite
  # friction-rules:   needs bridge approval workflow
