id: schedule_to_telegram
name: Scheduled Telegram Notification
description: Sends a message to Telegram on a schedule — perfect for daily reminders, reports, or alerts
category: communication
tags: [telegram, schedule, notification, reminder]
tested_n8n_version: "2.x"
required_credentials:
  - telegram

variables:
  - name: schedule_cron
    description: When to send (cron expression)
    type: cron
    default: "0 8 * * *"
    required: true
    examples: ["0 8 * * *", "0 9 * * 1-5", "0 20 * * 0"]
  - name: telegram_chat_id
    description: Telegram chat ID to send to
    type: string
    required: true
  - name: message_text
    description: Message to send
    type: string
    required: true
    examples: ["Good morning! Here's your daily reminder.", "Weekly report time."]
  - name: workflow_name
    description: Human-readable name
    type: string
    default: "Telegram Notification"

template:
  name: "{{workflow_name}}"
  nodes:
    - id: "trigger-1"
      name: "Schedule"
      type: "n8n-nodes-base.scheduleTrigger"
      typeVersion: 1.2
      position: [250, 300]
      parameters:
        rule:
          interval:
            - field: "cronExpression"
              expression: "{{schedule_cron}}"
    - id: "telegram-1"
      name: "Send Telegram"
      type: "n8n-nodes-base.telegram"
      typeVersion: 1.2
      position: [450, 300]
      parameters:
        chatId: "{{telegram_chat_id}}"
        text: "{{message_text}}"
        additionalFields: {}
      credentials:
        telegramApi:
          id: null
          name: "Telegram Bot"
  connections:
    Schedule:
      main:
        - - node: "Send Telegram"
            type: "main"
            index: 0
  settings:
    executionOrder: "v1"
