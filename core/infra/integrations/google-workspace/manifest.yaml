# Google Workspace Integration Manifest

name: Google Workspace
version: "2.0"
category: productivity

description: >
  Full Google Workspace access via gws CLI (https://github.com/googleworkspace/cli).
  Gmail, Drive, Calendar, Docs, Sheets, Slides, Forms, Tasks, Contacts, Chat,
  Apps Script, Google Search. OAuth credentials stored in macOS Keychain,
  multi-account wrapper at core/bin/internal/gws-account.

# What this integration provides to the system
provides:
  email:
    type: bidirectional
    description: Gmail — read, send, search, labels, drafts
  drive:
    type: read_write
    description: Google Drive — list, search, read, create, upload, share
  calendar:
    type: read_write
    description: Google Calendar — list, create, update, delete events
  docs:
    type: read_write
    description: Google Docs — read, create, edit documents
  sheets:
    type: read_write
    description: Google Sheets — read, create, edit spreadsheets, cell-level ops
  slides:
    type: read_write
    description: Google Slides — read, create, edit presentations
  forms:
    type: read_write
    description: Google Forms — create, read responses
  tasks:
    type: read_write
    description: Google Tasks — list, create, complete tasks
  contacts:
    type: read_write
    description: Google Contacts — search, read, create, update
  chat:
    type: bidirectional
    description: Google Chat — send, read messages
  apps_script:
    type: execute
    description: Google Apps Script — run scripts, manage projects
  search:
    type: query
    description: Google Search — web search via API

# What this integration needs to function
requires:
  secrets:
    - key: GOOGLE_OAUTH_CLIENT_ID
      store: keychain
      description: Google OAuth client ID
    - key: GOOGLE_OAUTH_CLIENT_SECRET
      store: keychain
      description: Google OAuth client secret
    - key: GOOGLE_PRIMARY_EMAIL
      store: keychain
      description: Primary Google account email
  binaries:
    - name: gws
      install: brew install googleworkspace-cli
      description: Google Workspace CLI
  scripts:
    - name: gws-account
      path: core/bin/internal/gws-account
      description: Multi-account wrapper that sets credentials per invocation
  config: []

# How to verify this integration is working
health:
  checks:
    - name: gws_installed
      command: "which gws >/dev/null 2>&1 && echo installed"
      expect: installed
    - name: wrapper_exists
      command: "test -x ~/aos/core/bin/internal/gws-account && echo exists"
      expect: exists
    - name: credentials_stored
      command: "~/aos/core/bin/cli/agent-secret get GOOGLE_OAUTH_CLIENT_ID >/dev/null 2>&1 && echo ok"
      expect: ok
    - name: account_tokens
      command: "ls ~/.aos/config/google/credentials/*.json >/dev/null 2>&1 && echo ok"
      expect: ok

# Capability chain entries this integration adds.
capabilities:
  Gmail:
    method: gws-cli
    cost: zero
    notes: "gws CLI — full Gmail: read, send, search, labels, drafts."
  Calendar:
    method: gws-cli
    cost: zero
    notes: "gws CLI — Google Calendar CRUD. List, create, update, delete events."
  "Google Drive":
    method: gws-cli
    cost: zero
    notes: "gws CLI — list, search, read, create, upload, share files."
  "Google Docs":
    method: gws-cli
    cost: zero
    notes: "gws CLI — read, create, edit Google Docs."
  "Google Sheets":
    method: gws-cli
    cost: zero
    notes: "gws CLI — read, create, edit spreadsheets, cell-level ops."
  Contacts:
    method: gws-cli
    cost: zero
    notes: "gws CLI — Google Contacts: search, read, create, update."

# Layers this integration touches
layers:
  - integrations   # This manifest
  - cli            # gws binary + gws-account wrapper

# Setup steps
setup:
  steps:
    - description: Install gws CLI
      type: command
      command: "brew install googleworkspace-cli"
    - description: Store OAuth credentials
      type: interactive
      instruction: >
        Store Google OAuth credentials in Keychain:
        agent-secret set GOOGLE_OAUTH_CLIENT_ID <id>
        agent-secret set GOOGLE_OAUTH_CLIENT_SECRET <secret>
        agent-secret set GOOGLE_PRIMARY_EMAIL <email>
    - description: Authenticate accounts
      type: interactive
      instruction: >
        For each Google account, authenticate via gws:
        GOOGLE_WORKSPACE_CLI_CLIENT_ID=$(agent-secret get GOOGLE_OAUTH_CLIENT_ID)
        GOOGLE_WORKSPACE_CLI_CLIENT_SECRET=$(agent-secret get GOOGLE_OAUTH_CLIENT_SECRET)
        GOOGLE_WORKSPACE_CLI_CONFIG_DIR=~/.config/gws/tmp gws auth login
        Then convert the credential file to ~/.aos/config/google/credentials/{email}.json
    - description: Verify
      type: health_check
