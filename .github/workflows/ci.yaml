name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  lint-shell:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          # Find all shell scripts: *.sh files + extensionless scripts with shebangs
          find . -type f \( -name "*.sh" -o -path "*/bin/*" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.venv/*" \
            -not -path "*/target/*" \
            -not -path "*/vendor/*" \
            -exec sh -c 'head -1 "$1" | grep -q "#!/.*\(bash\|sh\)" && echo "$1"' _ {} \; \
            | xargs shellcheck --severity=warning

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pyyaml
      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_initiative_bridge.py
